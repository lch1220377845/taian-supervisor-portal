<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>泰安建设监理协会人才管理系统</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      background: #f0f4f8;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 48px 40px;
      text-align: center;
      max-width: 480px;
      width: 90%;
    }
    .logo {
      font-size: 48px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 22px;
      color: #1a3a5c;
      margin-bottom: 8px;
    }
    p {
      color: #666;
      font-size: 14px;
      margin-bottom: 32px;
    }
    a.btn {
      display: inline-block;
      background: #1a6fc4;
      color: #fff;
      text-decoration: none;
      padding: 12px 36px;
      border-radius: 6px;
      font-size: 16px;
      transition: background 0.2s;
    }
    a.btn:hover { background: #155a9e; }
    .footer {
      margin-top: 32px;
      font-size: 12px;
      color: #aaa;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo"></div>
    <h1>泰安建设监理协会<br>人才管理系统</h1>
    <p>会员单位人员信息管理、证书查询、备用人员公示</p>
    <a class="btn" href="https://pktwdsn1ud.ai-app.pub" target="_blank">进入系统</a>
    <div class="footer">2025 </div>
  </div>
</body>
</html>
